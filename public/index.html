<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dice Guess Game</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <h1>Dice Guess</h1>
    <p class="subtitle">Guess the number 1-6 and earn points!</p>

    <div class="dice" id="dice">?</div>

    <div class="controls">
      <label for="guess">Your guess</label>
      <select id="guess">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
      </select>
      <button id="rollBtn">Roll Dice</button>
    </div>

    <div class="stats">
      <div class="stat">
        <span class="label">Score</span>
        <span class="value" id="score">0</span>
      </div>
      <div class="stat">
        <span class="label">Rounds</span>
        <span class="value" id="rounds">0</span>
      </div>
      <div class="stat">
        <span class="label">Streak</span>
        <span class="value" id="streak">cold</span>
      </div>
    </div>

    <div class="message" id="message">Pick a number and roll!</div>
  </div>
  <script src="/game.js"></script>
</body>
</html>
